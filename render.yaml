services:
  # Newsly Application (FREE TIER)
  - type: web
    name: newsly
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/status
    plan: free  # FREE TIER!
    envVars:
      # Database - Use FREE external database (see options below)
      - key: DB_HOST
        sync: false  # You'll add this manually
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: news_aggregator

      # API Keys (REQUIRED - add in dashboard)
      - key: NEWSAPI_KEY
        sync: false
      - key: NEWSDATA_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # Optional API Keys
      - key: GNEWS_KEY
        value: optional
      - key: TWITTER_BEARER_TOKEN
        value: optional

      # OpenAI Configuration
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_CACHE_ENABLED
        value: true
      - key: LLM_DAILY_BUDGET
        value: 1.00

      # Server Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Worker Configuration
      - key: FETCH_INTERVAL_MINUTES
        value: 15
      - key: ARTICLE_RETENTION_DAYS
        value: 7
      - key: MAX_ARTICLES_PER_FETCH
        value: 50

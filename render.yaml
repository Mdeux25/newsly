databases:
  - name: newsly-db
    databaseName: news_aggregator
    plan: free

services:
  - type: web
    name: newsly
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    plan: free
    envVars:
      # Render PostgreSQL — auto-populated from the database above
      - key: DATABASE_URL
        fromDatabase:
          name: newsly-db
          property: connectionString

      # API Keys (REQUIRED - add in dashboard)
      - key: NEWSAPI_KEY
        sync: false
      - key: NEWSDATA_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # Optional API Keys
      - key: GNEWS_KEY
        value: optional
      - key: TWITTER_BEARER_TOKEN
        value: optional

      # OpenAI Configuration
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_CACHE_ENABLED
        value: true
      - key: LLM_DAILY_BUDGET
        value: 1.00

      # Server Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Worker Configuration
      - key: FETCH_INTERVAL_MINUTES
        value: 15
      - key: ARTICLE_RETENTION_DAYS
        value: 7
      - key: MAX_ARTICLES_PER_FETCH
        value: 50

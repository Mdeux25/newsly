services:
  # Newsly Application (FREE TIER)
  - type: web
    name: newsly
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/status
    plan: free  # FREE TIER!
    envVars:
      # Render MySQL Database (Internal connection)
      - key: DATABASE_URL
        fromDatabase:
          name: newsly-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: newsly-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: newsly-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: newsly-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: newsly-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: newsly-db
          property: database
      - key: DB_SSL
        value: false  # Render internal connections don't need SSL

      # API Keys (REQUIRED - add in dashboard)
      - key: NEWSAPI_KEY
        sync: false
      - key: NEWSDATA_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # Optional API Keys
      - key: GNEWS_KEY
        value: optional
      - key: TWITTER_BEARER_TOKEN
        value: optional

      # OpenAI Configuration
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_CACHE_ENABLED
        value: true
      - key: LLM_DAILY_BUDGET
        value: 1.00

      # Server Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Worker Configuration
      - key: FETCH_INTERVAL_MINUTES
        value: 15
      - key: ARTICLE_RETENTION_DAYS
        value: 7
      - key: MAX_ARTICLES_PER_FETCH
        value: 50

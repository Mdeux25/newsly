<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#060a12"/>
      <stop offset="55%"  style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#0f1829"/>
    </linearGradient>

    <!-- Lapis-to-saffron gradient for "Newsly" -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#1e3a5f"/>
      <stop offset="45%"  style="stop-color:#2d6a9f"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- Blue-purple gradient for .ai suffix -->
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>

    <!-- Warm ambient glow -->
    <radialGradient id="warmOrb" cx="52%" cy="52%" r="40%">
      <stop offset="0%"   style="stop-color:#1e3a5f;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0"/>
    </radialGradient>

    <!-- AI glow on the right -->
    <radialGradient id="aiOrb" cx="75%" cy="52%" r="28%">
      <stop offset="0%"   style="stop-color:#818cf8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </radialGradient>

    <!-- Glow filter for main name -->
    <filter id="nameGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow filter for .ai -->
    <filter id="aiGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot-grid pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient orbs -->
  <ellipse cx="520" cy="315" rx="440" ry="230" fill="url(#warmOrb)"/>
  <ellipse cx="870" cy="315" rx="280" ry="180" fill="url(#aiOrb)"/>

  <!-- Accent lines -->
  <line x1="0" y1="140" x2="1200" y2="140" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="490" x2="1200" y2="490" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- ── Main name row ── -->

  <!-- "Newsly" — left-aligned within the centered group -->
  <text
    x="490" y="360"
    font-family="'SF Pro Display','-apple-system','Helvetica Neue',Arial,sans-serif"
    font-size="188"
    font-weight="800"
    text-anchor="middle"
    fill="url(#nameGrad)"
    filter="url(#nameGlow)"
    letter-spacing="-4">Newsly</text>

  <!-- ".ai" suffix -->
  <text
    x="852" y="357"
    font-family="'SF Pro Display','-apple-system','Helvetica Neue',Arial,sans-serif"
    font-size="108"
    font-weight="700"
    font-style="italic"
    text-anchor="middle"
    fill="url(#aiGrad)"
    filter="url(#aiGlow)"
    letter-spacing="-1">.ai</text>

  <!-- Divider between name and .ai -->
  <circle cx="730" cy="328" r="6" fill="rgba(255,255,255,0.15)"/>

  <!-- ── Divider ── -->
  <line x1="360" y1="410" x2="840" y2="410" stroke="rgba(30,58,95,0.4)" stroke-width="1"/>

  <!-- ── Taglines ── -->
  <text x="600" y="453"
    font-family="'-apple-system','Helvetica Neue',Arial,sans-serif"
    font-size="25"
    font-weight="500"
    text-anchor="middle"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="0.3">Smart News · AI Summaries · Interactive Map · Middle East &amp; World</text>

  <text x="600" y="486"
    font-family="'-apple-system','Helvetica Neue',Arial,sans-serif"
    font-size="21"
    font-weight="300"
    text-anchor="middle"
    fill="rgba(255,255,255,0.18)"
    letter-spacing="0.5">أخبار ذكية بالعربية والإنجليزية · الشرق الأوسط والعالم</text>

  <!-- ── Bottom bar ── -->
  <rect x="0" y="565" width="1200" height="65" fill="rgba(0,0,0,0.5)"/>
  <rect x="0" y="565" width="1200" height="1.5" fill="rgba(129,140,248,0.35)"/>

  <!-- Left: brand -->
  <text x="40" y="607"
    font-family="'-apple-system',Arial,sans-serif"
    font-size="15"
    font-weight="600"
    fill="rgba(255,255,255,0.28)"
    letter-spacing="2">NEWSLY.AI</text>

  <!-- Center: URL -->
  <text x="600" y="607"
    font-family="'-apple-system',Arial,sans-serif"
    font-size="15"
    text-anchor="middle"
    fill="rgba(255,255,255,0.18)"
    letter-spacing="2">newsly-jeur.onrender.com</text>

  <!-- Right: tagline pill -->
  <rect x="1010" y="586" width="150" height="26" rx="4" fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
  <text x="1085" y="604"
    font-family="'-apple-system',Arial,sans-serif"
    font-size="12"
    font-weight="600"
    text-anchor="middle"
    fill="rgba(129,140,248,0.7)"
    letter-spacing="1">Powered by AI</text>
</svg>

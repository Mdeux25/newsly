<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#060a12"/>
      <stop offset="55%"  style="stop-color:#0b1220"/>
      <stop offset="100%" style="stop-color:#0f1829"/>
    </linearGradient>

    <!-- Saffron gradient for Arabic name -->
    <linearGradient id="saffron" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   style="stop-color:#d97706"/>
      <stop offset="50%"  style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>

    <!-- Blue-purple gradient for .ai suffix -->
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>

    <!-- Warm ambient glow behind text -->
    <radialGradient id="warmOrb" cx="58%" cy="52%" r="38%">
      <stop offset="0%"   style="stop-color:#d97706;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>

    <!-- Cool AI glow on the left -->
    <radialGradient id="aiOrb" cx="28%" cy="52%" r="25%">
      <stop offset="0%"   style="stop-color:#818cf8;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </radialGradient>

    <!-- Soft glow filter for the name -->
    <filter id="nameGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow filter for .ai -->
    <filter id="aiGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot-grid pattern (AI aesthetic) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient orbs -->
  <ellipse cx="700" cy="315" rx="420" ry="220" fill="url(#warmOrb)"/>
  <ellipse cx="310" cy="315" rx="280" ry="180" fill="url(#aiOrb)"/>

  <!-- Thin horizontal accent lines (AI grid feel) -->
  <line x1="0" y1="140" x2="1200" y2="140" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="490" x2="1200" y2="490" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- ── Main name row ── -->

  <!-- Arabic name: نيوزلي — right portion, saffron -->
  <text
    x="680" y="360"
    font-family="'Geeza Pro','Arabic Typesetting','Simplified Arabic',Tahoma,Arial,sans-serif"
    font-size="188"
    font-weight="700"
    text-anchor="middle"
    fill="url(#saffron)"
    filter="url(#nameGlow)"
    direction="rtl"
    unicode-bidi="bidi-override">نيوزلي</text>

  <!-- .ai suffix — left of Arabic, blue-purple -->
  <text
    x="338" y="357"
    font-family="'SF Pro Display','-apple-system','Helvetica Neue',Arial,sans-serif"
    font-size="108"
    font-weight="700"
    font-style="italic"
    text-anchor="middle"
    fill="url(#aiGrad)"
    filter="url(#aiGlow)"
    letter-spacing="-1">.ai</text>

  <!-- Dot separator between .ai and Arabic (like a domain) -->
  <circle cx="465" cy="328" r="6" fill="rgba(255,255,255,0.15)"/>

  <!-- ── Divider ── -->
  <line x1="380" y1="410" x2="820" y2="410" stroke="rgba(217,119,6,0.2)" stroke-width="1"/>

  <!-- ── Taglines ── -->
  <text x="600" y="453"
    font-family="'Geeza Pro','Simplified Arabic',Tahoma,Arial,sans-serif"
    font-size="25"
    text-anchor="middle"
    fill="rgba(255,255,255,0.32)"
    direction="rtl">أخبار ذكية · ملخصات AI · خريطة تفاعلية · الشرق الأوسط والعالم</text>

  <text x="600" y="486"
    font-family="'-apple-system','Helvetica Neue',Arial,sans-serif"
    font-size="21"
    font-weight="300"
    text-anchor="middle"
    fill="rgba(255,255,255,0.18)"
    letter-spacing="0.5">Smart Bilingual News · AI Summaries · Interactive Map · Middle East &amp; World</text>

  <!-- ── Bottom bar ── -->
  <rect x="0" y="565" width="1200" height="65" fill="rgba(0,0,0,0.5)"/>
  <rect x="0" y="565" width="1200" height="1.5" fill="rgba(129,140,248,0.35)"/>

  <!-- Left: brand -->
  <text x="40" y="607"
    font-family="'-apple-system',Arial,sans-serif"
    font-size="15"
    font-weight="600"
    fill="rgba(255,255,255,0.28)"
    letter-spacing="2">NEWZLY.AI</text>

  <!-- Center: URL -->
  <text x="600" y="607"
    font-family="'-apple-system',Arial,sans-serif"
    font-size="15"
    text-anchor="middle"
    fill="rgba(255,255,255,0.18)"
    letter-spacing="2">newsly-jeur.onrender.com</text>

  <!-- Right: tagline pill -->
  <rect x="1010" y="586" width="150" height="26" rx="4" fill="rgba(129,140,248,0.12)" stroke="rgba(129,140,248,0.25)" stroke-width="1"/>
  <text x="1085" y="604"
    font-family="'-apple-system',Arial,sans-serif"
    font-size="12"
    font-weight="600"
    text-anchor="middle"
    fill="rgba(129,140,248,0.7)"
    letter-spacing="1">Powered by AI</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile-First Viewport (with safe-area-inset support) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Theme Color (for mobile browser chrome) -->
  <meta name="theme-color" content="#0f1419">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1419">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5">

  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Newsly">
  <meta name="application-name" content="Newsly">

  <title>Newsly - Smart Global News Aggregator</title>
  <meta name="description" content="Newsly — Smart bilingual news aggregator covering the Middle East and world. Real-time stories in English and Arabic, AI summaries, and interactive map. أخبار ذكية بالعربية والإنجليزية.">

  <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Newsly">
  <meta property="og:url"         content="https://newsly-jeur.onrender.com">
  <meta property="og:title"       content="Newsly — أخبار ذكية | Smart Bilingual News">
  <meta property="og:description" content="Real-time news from the Middle East and the world — in English and Arabic. AI summaries, interactive map, and trending topics. أخبار عاجلة بالعربية والإنجليزية مع ملخصات ذكاء اصطناعي.">
  <meta property="og:image"       content="https://newsly-jeur.onrender.com/og-banner.svg">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt"   content="Newsly — Smart Bilingual News Aggregator">
  <meta property="og:locale"      content="en_US">
  <meta property="og:locale:alternate" content="ar_AR">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Newsly — أخبار ذكية | Smart Bilingual News">
  <meta name="twitter:description" content="Real-time news from the Middle East and the world — in English and Arabic. AI summaries, interactive map, trending topics.">
  <meta name="twitter:image"       content="https://newsly-jeur.onrender.com/og-banner.svg">
  <meta name="twitter:image:alt"   content="Newsly — Smart Bilingual News Aggregator">

  <!-- Google AdSense — replace ca-pub-XXXX with your publisher ID -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7094371363598928"
       crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

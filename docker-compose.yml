version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: news-aggregator-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: news_aggregator
      MYSQL_USER: news_user
      MYSQL_PASSWORD: news_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  news-aggregator:
    build: .
    ports:
      - "8080:3001"
    environment:
      - NODE_ENV=production
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GNEWS_KEY=${GNEWS_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=news_user
      - DB_PASSWORD=news_password
      - DB_NAME=news_aggregator
    restart: unless-stopped
    volumes:
      # For development: mount source code for hot reload
      - ./backend:/app:delegated
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  # Development mode services
  backend-dev:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - GNEWS_KEY=${GNEWS_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=news_user
      - DB_PASSWORD=news_password
      - DB_NAME=news_aggregator
    volumes:
      - ./backend:/app
      - /app/node_modules
    profiles:
      - dev
    depends_on:
      mysql:
        condition: service_healthy

  frontend-dev:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    profiles:
      - dev
    depends_on:
      - backend-dev

volumes:
  mysql-data:
    driver: local

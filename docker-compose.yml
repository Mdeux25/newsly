version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: newsly-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: news_aggregator
      MYSQL_USER: news_user
      MYSQL_PASSWORD: news_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  newsly:
    build: .
    container_name: newsly-app
    ports:
      - "8080:3001"
    environment:
      # Server
      - NODE_ENV=production
      - PORT=3001

      # Database
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=news_user
      - DB_PASSWORD=news_password
      - DB_NAME=news_aggregator

      # News APIs
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - NEWSDATA_KEY=${NEWSDATA_KEY}
      - GNEWS_KEY=${GNEWS_KEY:-your_gnews_key_here}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-your_twitter_token_here}

      # Gemini for Smart Search + Summaries
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - LLM_CACHE_ENABLED=true
      - LLM_DAILY_BUDGET=1.00

      # Worker Configuration
      - FETCH_INTERVAL_MINUTES=15
      - ARTICLE_RETENTION_DAYS=7
      - MAX_ARTICLES_PER_FETCH=50

    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development mode services (optional)
  backend-dev:
    image: node:18-alpine
    container_name: newsly-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=news_user
      - DB_PASSWORD=news_password
      - DB_NAME=news_aggregator
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - NEWSDATA_KEY=${NEWSDATA_KEY}
      - GNEWS_KEY=${GNEWS_KEY:-your_gnews_key_here}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-your_twitter_token_here}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - LLM_CACHE_ENABLED=true
      - LLM_DAILY_BUDGET=1.00
      - FETCH_INTERVAL_MINUTES=15
      - ARTICLE_RETENTION_DAYS=7
      - MAX_ARTICLES_PER_FETCH=50
    volumes:
      - ./backend:/app
      - /app/node_modules
    profiles:
      - dev
    depends_on:
      mysql:
        condition: service_healthy

  frontend-dev:
    image: node:18-alpine
    container_name: newsly-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    profiles:
      - dev
    depends_on:
      - backend-dev

volumes:
  mysql-data:
    driver: local
